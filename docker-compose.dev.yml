version: '3.9'
# Dev mode: spins up only Redis, PostgreSQL, MinIO
# Run backend with: cd backend && uvicorn main:app --reload
# Run frontend with: cd frontend && npm run dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: caduser
      POSTGRES_PASSWORD: cadpass
      POSTGRES_DB: caddb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caduser -d caddb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres_data:
  minio_data:
